<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Avgångstavla – T-Skylten</title>
</head>
<body>
    <div class="container">
        <header class="board-header">
            <div class="flex-item-1">
                <a href="https://t-skylten.vkronmar.net"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0, 0, 61, 48" style="width: auto; height: 90px;"><title>SL</title><path d="M30.3 41.703a23.845 23.845 0 0 0 16.972-7.03 23.845 23.845 0 0 0 7.03-16.972v-.493h-2.815v.493c0 5.66-2.204 10.98-6.205 14.982A21.049 21.049 0 0 1 30.3 38.888c-5.66 0-10.98-2.203-14.982-6.205A21.048 21.048 0 0 1 9.113 17.7v-.493H6.298v.493a23.844 23.844 0 0 0 7.03 16.972 23.845 23.845 0 0 0 16.972 7.03zm0-38.888c8.208 0 14.886 6.678 14.886 14.886 0 8.209-6.678 14.887-14.886 14.887-8.208 0-14.887-6.678-14.887-14.887 0-8.208 6.679-14.886 14.887-14.886zm0 32.588c4.728 0 9.173-1.842 12.517-5.185A17.586 17.586 0 0 0 48 17.701c0-4.728-1.84-9.173-5.184-12.516A17.586 17.586 0 0 0 30.3 0a17.586 17.586 0 0 0-12.517 5.185A17.586 17.586 0 0 0 12.6 17.7c0 4.729 1.84 9.174 5.184 12.517A17.586 17.586 0 0 0 30.3 35.403zm27.485-18.195v.493c0 7.342-2.859 14.244-8.05 19.435-5.191 5.191-12.094 8.05-19.435 8.05-7.341 0-14.244-2.859-19.435-8.05-5.191-5.191-8.05-12.093-8.05-19.435v-.493H0v.493c0 4.09.801 8.058 2.382 11.795a30.197 30.197 0 0 0 6.493 9.63A30.2 30.2 0 0 0 30.3 48.002a30.2 30.2 0 0 0 21.425-8.875 30.199 30.199 0 0 0 6.493-9.63A30.113 30.113 0 0 0 60.6 17.7v-.493h-2.815zm-17.02 4.213H35.53v-11.22h-3.032v13.926h8.267v-2.706zm-15.191.247c-2.36 0-3.993-1.543-3.993-1.543l-1.686 2.074s2.178 2.12 5.621 2.12c3.07 0 5.055-1.686 5.055-4.294 0-2.732-2.168-3.636-4.511-4.205-2.718-.65-2.85-1.101-2.85-1.843 0-.812.686-1.316 1.791-1.316 1.732 0 3.085 1.013 3.085 1.013l1.707-2.104s-1.748-1.558-4.754-1.558c-2.837 0-4.744 1.678-4.744 4.175 0 2.64 1.71 3.57 4.664 4.284 2.696.623 2.696 1.162 2.696 1.785 0 .87-.798 1.412-2.081 1.412z" fill="white" fill-rule="evenodd"></path></svg></a>
            </div>
            <div class="flex-item-2 station-heading">
                <span class="eyebrow">Avgångar från</span>
                <h1 id="stationTitle">T-Skylten</h1>
            </div>
            <time class="flex-item-3 clock" id="clock" aria-label="Aktuell tid"></time>
        </header>
        <div class="table-wrap">
            <table id="stations" aria-label="Kommande avgångar"></table>
        </div>
    </div>
</body>

<script>
    const params = new URLSearchParams(window.location.search);
    const config = params.get("config");
    const showStopDesignation = params.get("showStop") === "true";
    const siteId = config?.split(";")[1];
    document.body.classList.toggle("show-stop", showStopDesignation);

    function getLineColor(lineNumber) {
        // Specifika linjenummer
        if (lineNumber === 7) {
            return "#747770"; // Spårväg city
        } else if (lineNumber === 30 || lineNumber === 31) {
            return "#b65f1f"; // Tvärbanan
        } else if ([172, 173, 174, 176, 177, 180, 185, 670, 676].includes(lineNumber)) {
            return "blue"; //Blåa bussar

        // Intervall av linjenummer
        } else if (lineNumber >= 10 && lineNumber <= 11) {
            return "#007db8"; // Tunnelbanelinjer 10-11
        } else if (lineNumber >= 13 && lineNumber <= 14) {
            return "#d71d24"; // Tunnelbanelinjer 13-14
        } else if (lineNumber >= 17 && lineNumber <= 19) {
            return "#148541"; // Tunnelbanelinjer 17-19
        } else if (lineNumber >= 27 && lineNumber <= 29) {
            return "#9f599a"; // Roslagsbanan 27-29
        } else if (lineNumber >= 40 && lineNumber <= 48) {
            return "#cc417f"; // Pendeltåg 40-48
        } else if (lineNumber >= 1 && lineNumber <= 6) {
            return "blue"; // Busslinjer 1-6
        } else if (lineNumber >= 30) {
            return "#73777d"; // Busslinjer 30 och uppåt

        // Ingen färg för ogiltiga linjenummer
        } else {
            return "";
        }
    }

    update = () => {
        if (!config) {
            return;
        }

        fetch(`/display-data?config=${encodeURIComponent(config)}`).then(
            res => {
                if (!res.ok) {
                    throw new Error("Unable to load departures");
                }
                return res.json();
            }).then(
                data => {
                    document.getElementById("stations").innerHTML = "";

                    // Skapa tabellhuvudet
                    const headerTr = document.createElement("tr");
                    headerTr.innerHTML = `<th class='line header'>Linje</th><th class='destination header'>Mot</th>${showStopDesignation ? "<th class='stop header'>Spår/läge</th>" : ""}<th class='time header'>Avgår</th>`;
                    document.getElementById("stations").appendChild(headerTr);

                    for (const departure of data.departures) {
                        const tr = document.createElement("tr");

                        // Skapa linje-cellen och sätt färg
                        const lineTd = document.createElement("td");
                        lineTd.innerText = departure.line;
                        lineTd.className = "line";

                        const lineNumber = parseInt(departure.line, 10); // Konvertera till nummer
                        if (!isNaN(lineNumber)) {
                            const color = getLineColor(lineNumber); // Hämta färg
                            if (color) {
                                lineTd.style.backgroundColor = color; // Ställ in bakgrundsfärg
                                lineTd.style.color = "white"; // Gör texten synlig
                                lineTd.style.fontWeight = "bold"; // För bättre läsbarhet
                            }
                        }

                        tr.appendChild(lineTd);

                        // Skapa destination- och tid-celler
                        const destinationTd = document.createElement("td");
                        destinationTd.innerText = departure.destination;
                        destinationTd.className = "destination";
                        tr.appendChild(destinationTd);

                        if (showStopDesignation) {
                            const stopTd = document.createElement("td");
                            stopTd.innerText = departure.stopDesignation || "–";
                            stopTd.className = "stop";
                            tr.appendChild(stopTd);
                        }

                        const timeTd = document.createElement("td");
                        timeTd.innerText = departure.display;
                        timeTd.className = "time";
                        tr.appendChild(timeTd);

                        document.getElementById("stations").appendChild(tr);
                    }

                    for (const message of data.deviations) {
                        // Om raden är information, skapa varningsikon och slå ihop resterande kolumner
                        const tr = document.createElement("tr");

                        // Kolumn 1: Varningsikon
                        const warningTd = document.createElement("td");
                        warningTd.className = "warning";
                        warningTd.innerHTML = "<span aria-hidden='true'>!</span><span class='sr-only'>Trafikinformation</span>";
                        tr.appendChild(warningTd);

                        // Kolumn 2: Informationsmeddelande
                        const infoTd = document.createElement("td");
                        infoTd.className = "info";
                        infoTd.colSpan = showStopDesignation ? "3" : "2";
                        infoTd.innerText = message;
                        tr.appendChild(infoTd);

                        document.getElementById("stations").appendChild(tr);
                    }
            }).catch(error => {
                console.error(error);
            });
    }

    // Uppdatera tabellen med jämna mellanrum
    setInterval(update, 15000);
    setTimeout(update, 0);

    // Klocka
    function updateClock() {
        const clockElement = document.getElementById('clock');
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        clockElement.textContent = `${hours}:${minutes}:${seconds}`;
    }

    // Uppdatera klockan varje sekund
    setInterval(updateClock, 1000);

    // Starta klockan direkt när sidan laddas
    updateClock();

    if (siteId) {
        fetch("/station?site_id=" + encodeURIComponent(siteId)).then(response => response.json()).then(station => {
            document.getElementById("stationTitle").innerText = station.name;
        });
    }

</script>

<style>
    /* General CSS */
    body {
        background-color: #3e4145;
        font-family: "Public Sans", sans-serif;
        font-size: 24px;
        color: #FFF;
    }

    .container {
        background-color: #000;
        padding: 1% 4%;
        margin: 2% 3%;
        border-radius: 10px;
    }

    #stations {
        font-size: 24px;
    }

    .clock {
        font-family: 'Courier New', monospace;
        text-align: right;
        letter-spacing: 2px;
        font-weight: bold;
        font-size: 4rem;
    }

    /* TEXT */
    h1 {
        font-size: 54px;
    }

    /* Flexbox */
    .flex {
        display: flex;
        flex-direction: column;
        flex-flow: row wrap;
        flex-wrap: nowrap;
    }

    .flex-item-1 {
        flex-grow: 1;
        flex-basis: auto;
        display: block;
        margin: auto;
        text-align: left;
        padding: 1%;
    }

    .flex-item-2 {
        flex-grow: 10;
    }

    .flex-item-3 {
        flex-grow: 3;
        flex-basis: auto;
        display: block;
        margin: auto;
    }

    /* Table */
    table {
        border-collapse: separate;
        width: 100%;
        border-spacing: 0 35px;
        vertical-align: middle;
    }

    table td {
        font-size: 32px !important;
    }

    .header {
        font-weight: 600 !important;
        font-size: 38px;
        border-bottom: 2px solid !important;
        border-radius: 0px !important;
    }

    .line {
        width: auto;
        text-align: center;
        font-weight: bold;
        border-radius: 10px;
        margin-left: 100px;
        border: 20px;
        padding: 8px 0px;
    }

    .destination {
        text-align: left;
        width: 72%;
        padding-left: 3%;
    }

    .show-stop .destination {
        width: 62%;
    }

    .stop {
        text-align: left;
        width: 12%;
        white-space: nowrap;
    }

    .time {
        text-align: left;
        width: 20%;
    }

    .info {
        width: 100%;
        font-size: 1rem;
        padding: 5px 10px;
        text-align: left;
    }

    /* Varningsikon och informationsrader */
    .warning {
        text-align: center;
        font-size: 3rem !important;
    }

    /* Slå ihop de två kolumnerna för information */
    .info {
        padding-left: 3%;
        font-size: 1rem;
        text-align: left;
    }
</style>
<style>
    @font-face {
        font-family: "SL Gothic";
        src: url("/assets/fonts/slgothictext2-regular.woff2") format("woff2");
        font-style: normal;
        font-weight: 400;
        font-display: swap;
    }

    @font-face {
        font-family: "SL Gothic";
        src: url("/assets/fonts/slgothictext2-bold.woff2") format("woff2");
        font-style: normal;
        font-weight: 700;
        font-display: swap;
    }

    @font-face {
        font-family: "SL Gothic Display";
        src: url("/assets/fonts/slgothicdisplay-bold.woff2") format("woff2");
        font-style: normal;
        font-weight: 700;
        font-display: swap;
    }

    :root {
        color-scheme: dark;
        --sl-blue: #2870f0;
        --sl-black: #12151a;
        --board: #050607;
        --board-line: #3a3f47;
        --board-muted: #bdc3cb;
        --warning: #c8783a;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
        margin: 0;
        padding: clamp(16px, 3vw, 48px);
        background: var(--sl-black);
        color: #fff;
        font-family: "SL Gothic", Arial, sans-serif;
        font-size: 24px;
    }

    body::before {
        content: "";
        position: fixed;
        inset: 0 0 auto;
        height: 8px;
        background: var(--sl-blue);
    }

    .container {
        width: min(1500px, 100%);
        min-height: calc(100vh - clamp(32px, 6vw, 96px));
        margin: 0 auto;
        padding: clamp(24px, 4vw, 60px);
        overflow: hidden;
        border: 1px solid #2c3036;
        border-radius: 8px;
        background: var(--board);
    }

    .board-header {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        align-items: center;
        gap: clamp(20px, 3vw, 44px);
        padding-bottom: clamp(24px, 3vw, 42px);
        border-bottom: 1px solid var(--board-line);
    }

    .flex-item-1,
    .flex-item-2,
    .flex-item-3 {
        display: block;
        margin: 0;
        padding: 0;
    }

    .flex-item-1 a {
        display: grid;
        width: 96px;
        height: 96px;
        place-items: center;
        border-radius: 50%;
        background: var(--sl-blue);
        color: #fff;
    }

    .flex-item-1 svg {
        width: 66px !important;
        height: auto !important;
    }

    .station-heading { min-width: 0; }

    .eyebrow {
        display: block;
        margin-bottom: 4px;
        color: var(--board-muted);
        font-size: clamp(16px, 1.5vw, 22px);
        line-height: 1.2;
    }

    h1 {
        overflow: hidden;
        margin: 0;
        color: #fff;
        font-family: "SL Gothic Display", "SL Gothic", sans-serif;
        font-size: clamp(36px, 5vw, 72px);
        font-weight: 700;
        line-height: 1;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .clock {
        color: #fff;
        font-family: "SL Gothic Display", "SL Gothic", sans-serif;
        font-size: clamp(32px, 4.5vw, 64px);
        font-weight: 700;
        line-height: 1;
        letter-spacing: .02em;
        text-align: right;
        font-variant-numeric: tabular-nums;
    }

    .table-wrap { overflow-x: auto; }

    #stations {
        width: 100%;
        border-collapse: collapse;
        border-spacing: 0;
        color: #fff;
        font-size: clamp(22px, 2.7vw, 38px);
        vertical-align: middle;
    }

    #stations th,
    #stations td {
        border-bottom: 1px solid var(--board-line);
    }

    #stations td {
        height: clamp(74px, 8vw, 110px);
        font-size: inherit !important;
    }

    #stations .header {
        height: 62px;
        border-bottom: 1px solid var(--board-line) !important;
        color: var(--board-muted);
        font-size: clamp(16px, 1.5vw, 22px);
        font-weight: 400 !important;
        letter-spacing: .01em;
        text-align: left;
    }

    #stations .line {
        width: 112px;
        padding: 0 20px 0 0;
        border-radius: 0;
        text-align: left;
    }

    #stations td.line {
        width: 76px;
        height: 56px;
        padding: 0 14px;
        border: 10px solid var(--board);
        border-radius: 18px;
        font-weight: 700 !important;
        text-align: center;
        background-clip: padding-box;
    }

    #stations .destination {
        width: auto;
        padding: 0 28px 0 0;
        text-align: left;
    }

    #stations .stop {
        width: 16%;
        padding-right: 24px;
        color: #edf0f3;
        text-align: left;
        white-space: nowrap;
    }

    #stations .time {
        width: 20%;
        color: #fff;
        font-weight: 700;
        text-align: right;
        white-space: nowrap;
    }

    #stations .warning {
        width: 76px;
        padding-right: 14px;
        color: var(--warning);
        font-size: 28px !important;
        font-weight: 700;
        text-align: center;
    }

    #stations .warning > span:first-child {
        display: inline-grid;
        width: 38px;
        height: 38px;
        place-items: center;
        border: 3px solid currentColor;
        border-radius: 50%;
    }

    #stations .info {
        padding: 18px 0;
        color: #f0d2bb;
        font-size: clamp(16px, 1.5vw, 21px);
        line-height: 1.35;
    }

    .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
    }

    @media (max-width: 720px) {
        body { padding: 8px; }
        body::before { height: 4px; }
        .container { min-height: calc(100vh - 16px); padding: 20px 16px; }
        .board-header { grid-template-columns: auto minmax(0, 1fr); gap: 16px; }
        .flex-item-1 a { width: 64px; height: 64px; }
        .flex-item-1 svg { width: 46px !important; }
        .clock { grid-column: 1 / -1; padding-top: 16px; border-top: 1px solid var(--board-line); }
        #stations { min-width: 620px; }
    }
</style>
</html>
